<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Cancelado - Casa Pastri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center animate-in fade-in zoom-in duration-500">
        <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-icons text-5xl">cancel</span>
        </div>
        <h1 class="text-3xl font-black text-slate-900 mb-4">Pago Cancelado</h1>
        <p class="text-slate-600 mb-8 leading-relaxed">
            Parece que el proceso de pago se ha interrumpido. No te preocupes, tus fechas siguen bloqueadas temporalmente.
        </p>
        <a href="/#disponibilidad" class="inline-block w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-primary/90 transition-colors" style="background-color: #0ea5e9;">Intentar de nuevo</a>
        <a href="/" class="block mt-4 text-slate-400 font-semibold hover:underline">Volver al inicio</a>
    </div>
</body>
</html>
